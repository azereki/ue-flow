name: Build & Verify

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install and build
        run: |
          cd js && npm ci
          cd .. && npm run build

      - name: Run tests
        run: npm test

      - name: Check bundle size
        run: |
          SIZE=$(stat -c%s js/dist/ue-flow.iife.js 2>/dev/null || stat -f%z js/dist/ue-flow.iife.js)
          echo "Bundle size: $((SIZE / 1024)) KB"
          if [ "$SIZE" -gt 2621440 ]; then
            echo "::error::Bundle size exceeds 2.5MB threshold ($((SIZE / 1024)) KB)"
            exit 1
          fi

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python package
        run: cd python && pip install -e ".[dev]"

      - name: Run Python tests
        run: cd python && python -m pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: cd js && npm ci

      - name: Run ESLint
        run: cd js && npx eslint . || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install dependencies
        run: cd js && npm ci

      - name: Install Playwright browsers
        run: cd js && npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: cd js && npx playwright test --reporter=github
